name: 기능 제안 / Feature request
description: 이런 게 있으면 좋겠어요 / I wish it did this
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: 어떤 문제를 풀고 싶나요? / What problem would this solve?
      description: 기능 자체보다 문제 상황을 알려주시면 더 좋은 답을 찾을 수 있습니다.
    validations:
      required: true
  - type: textarea
    attributes:
      label: 생각한 방법 / Proposed approach (optional)
