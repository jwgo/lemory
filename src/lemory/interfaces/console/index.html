<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lemory 콘솔</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍋</text></svg>">
<link rel="stylesheet" href="/assets/app.css">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="brand">
      <span class="brand-mark">🍋</span>
      <div class="brand-text">
        <div class="brand-name">Lemory</div>
        <div class="brand-vault" id="vaultName">—</div>
      </div>
    </div>

    <nav id="nav">
      <a class="nav-item" data-view="overview" href="#/overview">
        <svg viewBox="0 0 16 16"><path d="M2 8.5 8 2.5l6 6M3.5 7.5v6h3v-3.5h3V13.5h3v-6"/></svg>
        현황
      </a>
      <a class="nav-item" data-view="knowledge" href="#/knowledge">
        <svg viewBox="0 0 16 16"><circle cx="4" cy="4" r="2"/><circle cx="12" cy="6" r="2"/><circle cx="7" cy="12" r="2"/><path d="M5.8 4.8 10.2 5.6M5 10.4 4.4 5.9M8.8 11 10.8 7.6"/></svg>
        지식
      </a>
      <a class="nav-item" data-view="health" href="#/health">
        <svg viewBox="0 0 16 16"><path d="M8 14s-5.5-3.3-5.5-7A3.2 3.2 0 0 1 8 4.6 3.2 3.2 0 0 1 13.5 7c0 3.7-5.5 7-5.5 7Z"/><path d="M4 8h2l1-2 2 4 1-2h2"/></svg>
        건강
      </a>
      <a class="nav-item" data-view="search" href="#/search">
        <svg viewBox="0 0 16 16"><circle cx="7" cy="7" r="4.5"/><path d="m10.5 10.5 3 3"/></svg>
        검색
      </a>
      <a class="nav-item" data-view="assistant" href="#/assistant">
        <svg viewBox="0 0 16 16"><path d="M2.5 3.5h11v7h-6l-3 2.5v-2.5h-2z"/><circle cx="6" cy="7" r=".9"/><circle cx="8" cy="7" r=".9"/><circle cx="10" cy="7" r=".9"/></svg>
        비서
      </a>
      <a class="nav-item" data-view="settings" href="#/settings">
        <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="2.2"/><path d="M8 1.8v2M8 12.2v2M1.8 8h2M12.2 8h2M3.6 3.6 5 5M11 11l1.4 1.4M12.4 3.6 11 5M5 11l-1.4 1.4"/></svg>
        설정
      </a>
    </nav>

    <div class="sidebar-foot">
      <button class="palette-hint" id="paletteHint">
        <svg viewBox="0 0 16 16"><circle cx="7" cy="7" r="4.5"/><path d="m10.5 10.5 3 3"/></svg>
        <span>이동 / 노트 찾기</span>
        <span class="kbds"><kbd>⌘</kbd><kbd>K</kbd></span>
      </button>
      <div class="watch-row">
        <span class="dot" id="watchDot"></span>
        <span id="watchLabel">연결 중…</span>
      </div>
    </div>
  </aside>

  <main id="main"><!-- view mounts here --></main>
</div>

<div id="palette" class="palette-overlay" hidden>
  <div class="palette">
    <input id="paletteInput" type="text" placeholder="어디로 갈까요? 노트 제목, 메뉴…" autocomplete="off" spellcheck="false">
    <div id="paletteResults" class="palette-results"></div>
  </div>
</div>

<div id="toasts"></div>
<script src="/assets/app.js"></script>
</body>
</html>
