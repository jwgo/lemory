<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
<rect width="880" height="320" rx="12" fill="#0d1117"/>
<text x="28" y="40" fill="#e6edf3" font-size="22" font-weight="700">Time until 1,469 notes are searchable</text>
<text x="28" y="64" fill="#8b949e" font-size="13">Same real Korean corpus. LLM-pipeline systems pay per note; Lemory reads the links you already wrote.</text>
